<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>根拠法令検索</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-pane" aria-label="検索">
        <div class="brand">
          <p class="eyebrow">生活保護運用事例集</p>
          <h1>根拠法令検索</h1>
        </div>

        <label class="search-box">
          <span>関連ワード</span>
          <input id="query" type="search" placeholder="例: 世帯分離、法第63条、入院、扶養義務者" autofocus />
        </label>

        <div class="filters" aria-label="絞り込み">
          <button class="filter active" data-filter="all" type="button">すべて</button>
          <button class="filter" data-filter="case" type="button">運用事例</button>
          <button class="filter" data-filter="act" type="button">生活保護法</button>
          <button class="filter" data-filter="record" type="button">調書記録</button>
          <button class="filter" data-filter="law" type="button">法令あり</button>
          <button class="filter" data-filter="notice" type="button">通知あり</button>
          <button class="filter" data-filter="qa" type="button">問答あり</button>
        </div>

        <div class="stats">
          <span id="result-count">0件</span>
          <span id="source-name"></span>
        </div>
      </section>

      <section class="results-pane" aria-label="検索結果">
        <div id="empty" class="empty">
          <h2>関連ワードを入力してください</h2>
          <p>問のタイトル、本文、根拠候補をまとめて検索します。</p>
        </div>
        <div id="results" class="results"></div>
      </section>

      <aside class="explain-pane" aria-label="本文要約">
        <div id="explanation" class="explanation">
          <p class="eyebrow">選択中の項目</p>
          <h2>検索結果を選択してください</h2>
          <p class="explain-lead">該当する問を選ぶと、本文の要約と根拠法令・通知を表示します。</p>
        </div>
      </aside>
    </main>

    <template id="result-template">
      <article class="result-card">
        <header>
          <p class="chapter"></p>
          <h2></h2>
        </header>
        <p class="ref-label">根拠法令・通知</p>
        <div class="refs"></div>
        <p class="snippet"></p>
        <button class="explain-button" type="button">本文要約を見る</button>
        <details>
          <summary>本文を確認</summary>
          <p class="body"></p>
        </details>
      </article>
    </template>

    <script src="app-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
